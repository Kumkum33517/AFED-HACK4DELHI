[phases.setup]
nixPkgs = ["nodejs_22", "python312"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install scikit-learn pandas numpy openpyxl",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
