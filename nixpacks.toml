[phases.setup]
nixPkgs = ["nodejs_22", "python312"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install scikit-learn pandas numpy openpyxl",
  "npx pnpm install --frozen-lockfile --prod=false"
]

[phases.build]
cmds = ["npx pnpm build"]

[start]
cmd = "npx tsx server/node-build.ts"
